<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Complaints</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <style>
        .complaint-card {
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 1rem;
        }
        .photo-thumb {
            max-width: 150px;
            max-height: 150px;
            object-fit: cover;
            border: 1px solid #eee;
            margin-bottom: 0.5rem;
        }
        .content-preview {
            white-space: pre-wrap;
            background-color: #f5f5f5;
            padding: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1>Admin Complaint Dashboard</h1>
    <p><strong>Total Complaints:</strong> <span th:text="${#numbers.formatDecimal(#lists.size(complaints), 0, 0, 0, 0, false)}"></span></p>

    <div th:each="complaint : ${complaints}">
        <div class="complaint-card card">
            <div class="card-body">
                <h5 class="card-title">From <span th:text="${complaint.user.username}">User</span> (Village: <span th:text="${complaint.user.villageName}">Village</span>)</h5>
                <p class="card-text">
                    <strong>Complaint:</strong>
                    <div class="content-preview" th:text="${complaint.content}">Complaint content</div>
                </p>
                <p class="card-text"><small class="text-muted">Submitted on <span th:text="${#temporals.format(complaint.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></small></p>
                <p>Photos:</p>
                <div th:each="photo : ${complaint.photos}" class="d-flex">
                    <img th:src="@{'/' + ${photo.filePath}}"
                         class="photo-thumb img-fluid rounded mb-2"
                         style="width: 100px; height: 100px; object-fit: cover;"/>
                </div>
                <div th:if="${#lists.size(complaint.photos) == 0}">None</div>
            </div>
        </div>
        <hr>
    </div>
    <a href="/login" class="btn btn-secondary mt-3">Back to Login</a>
</div>
</body>
</html>
